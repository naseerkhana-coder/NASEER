# MAXEK ERP — Nginx reverse proxy (Flask + Gunicorn)
# Install: sudo cp deploy/nginx-maxek-erp.conf /etc/nginx/sites-available/maxek-erp
# Enable:  sudo ln -sf /etc/nginx/sites-available/maxek-erp /etc/nginx/sites-enabled/
# Test:    sudo nginx -t && sudo systemctl reload nginx
#
# Replace erp.example.com with your domain or server IP hostname.

server {
    listen 80;
    server_name erp.example.com;

    client_max_body_size 32M;

    # Serve static files directly (CSS/JS/images — required for new UI)
    location /static/ {
        alias /var/www/maxek-erp/static/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Flask application via Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}

