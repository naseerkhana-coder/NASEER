<div class="pro-dash-theme-switcher" data-pro-theme-switcher role="group" aria-label="Dashboard theme">
  <button type="button" class="pro-dash-theme-pill" data-pro-theme="midnight" title="Midnight Blue Executive" aria-pressed="false">
    <span class="pro-dash-theme-swatch pro-dash-theme-swatch--midnight" aria-hidden="true"></span>
    <span class="pro-dash-theme-pill-label">Midnight</span>
  </button>
  <button type="button" class="pro-dash-theme-pill is-active" data-pro-theme="business" title="Business Light" aria-pressed="true">
    <span class="pro-dash-theme-swatch pro-dash-theme-swatch--business" aria-hidden="true"></span>
    <span class="pro-dash-theme-pill-label">Light</span>
  </button>
  <button type="button" class="pro-dash-theme-pill" data-pro-theme="erp-classic" title="ERP Classic Dark" aria-pressed="false">
    <span class="pro-dash-theme-swatch pro-dash-theme-swatch--erp-classic" aria-hidden="true"></span>
    <span class="pro-dash-theme-pill-label">Classic</span>
  </button>
</div>
