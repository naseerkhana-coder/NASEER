<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Reset your MAXEK Technologies ERP account password.">
    <title>Forgot Password — MAXEK Technologies ERP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/maxek-dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/maxek-login.css') }}">
  </head>
  <body class="maxek-login-v2">
    <div class="login-bg-overlay"></div>
    <div class="login-shell login-shell-single">
      <section class="login-card-panel">
        <div class="login-card">
          <div class="login-card-brand">
            <img
              src="{{ url_for('static', filename='images/maxek-logo.png') }}"
              alt="MAXEK Technologies"
              class="maxek-logo maxek-logo--card"
              width="180"
              height="90"
            >
          </div>
          <div class="login-card-header">
            <h2>Reset password</h2>
            <p>Enter your username. An administrator will reset your password.</p>
          </div>
          {% with messages = get_flashed_messages() %}
          {% if messages %}
          <div class="login-alert">{% for message in messages %}<div>{{ message }}</div>{% endfor %}</div>
          {% endif %}
          {% endwith %}
          <form method="post" class="login-form">
            <div class="login-field">
              <i class="fa-solid fa-user"></i>
              <input name="username" placeholder="Username" required>
            </div>
            <button class="login-submit" type="submit">Submit Request</button>
          </form>
          <p style="text-align:center;margin-top:1rem;"><a href="{{ url_for('login') }}" class="login-forgot">Back to sign in</a></p>
          <footer class="login-footer"><span>MAXEK Technologies ERP v{{ app_version or '1.0.0' }}</span></footer>
        </div>
      </section>
    </div>
  </body>
</html>
